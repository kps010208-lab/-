<!DOCTYPE html>
<html>
<head>
    <title>Главная - Кадровый учёт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🏢 Система кадрового учёта</h1>
        <div class="row text-center">
            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h3>{{ total_employees }}</h3>
                        <p>Сотрудников</p>
                        <a href="/employees" class="btn btn-light">Смотреть</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h3>{{ total_departments }}</h3>
                        <p>Отделов</p>
                        <a href="/departments" class="btn btn-light">Смотреть</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h3>{{ total_positions }}</h3>
                        <p>Должностей</p>
                        <a href="/positions" class="btn btn-light">Смотреть</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4 text-center">
            <a href="/search" class="btn btn-outline-primary">🔍 Поиск сотрудников</a>
        </div>
    </div>
</body>
</html>
