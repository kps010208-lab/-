<!DOCTYPE html>
<html>
<head>
    <title>Отделы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>📋 Список отделов</h2>
        <a href="/" class="btn btn-secondary mb-3">← На главную</a>
        <a href="/add_department" class="btn btn-primary mb-3">➕ Добавить отдел</a>
        <table class="table table-striped">
            <thead><tr><th>ID</th><th>Название</th><th>Расположение</th><th>Действия</th></tr></thead>
            <tbody>
                {% for dept in departments %}
                <tr>
                    <td>{{ dept.id }}</td>
                    <td>{{ dept.name }}</td>
                    <td>{{ dept.location }}</td>
                    <td><a href="/delete_department/{{ dept.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Удалить?')">Удалить</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
