<!DOCTYPE html>
<html>
<head>
    <title>Должности</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>💼 Список должностей</h2>
        <a href="/" class="btn btn-secondary mb-3">← На главную</a>
        <a href="/add_position" class="btn btn-primary mb-3">➕ Добавить должность</a>
        <table class="table table-striped">
            <thead><tr><th>ID</th><th>Название</th><th>Зарплата</th><th>Действия</th></tr></thead>
            <tbody>
                {% for pos in positions %}
                <tr>
                    <td>{{ pos.id }}</td>
                    <td>{{ pos.title }}</td>
                    <td>{{ pos.salary }}</td>
                    <td><a href="/delete_position/{{ pos.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Удалить?')">Удалить</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
