<!DOCTYPE html>
<html>
<head>
    <title>Сотрудники</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>👨‍💼 Список сотрудников</h2>
        <a href="/" class="btn btn-secondary mb-3">← На главную</a>
        <a href="/add_employee" class="btn btn-primary mb-3">➕ Добавить сотрудника</a>
        <table class="table table-bordered">
            <thead><tr><th>ID</th><th>ФИО</th><th>Дата рожд.</th><th>Дата приема</th><th>Отдел</th><th>Должность</th><th>Зарплата</th><th>Действия</th></tr></thead>
            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp.id }}</td>
                    <td>{{ emp.full_name }}</td>
                    <td>{{ emp.birth_date }}</td>
                    <td>{{ emp.hire_date }}</td>
                    <td>{{ emp.dept_name }}</td>
                    <td>{{ emp.pos_title }}</td>
                    <td>{{ emp.salary }}</td>
                    <td><a href="/delete_employee/{{ emp.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Удалить?')">Удалить</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
