<!DOCTYPE html>
<html>
<head>
    <title>Добавить сотрудника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>➕ Добавить нового сотрудника</h2>
        <form method="POST">
            <div class="mb-3"><label>ФИО</label><input type="text" name="full_name" class="form-control" required></div>
            <div class="mb-3"><label>Дата рождения</label><input type="date" name="birth_date" class="form-control" required></div>
            <div class="mb-3"><label>Дата приема</label><input type="date" name="hire_date" class="form-control" required></div>
            <div class="mb-3">
                <label>Отдел</label>
                <select name="department_id" class="form-select" required>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>Должность</label>
                <select name="position_id" class="form-select" required>
                    {% for pos in positions %}
                        <option value="{{ pos.id }}">{{ pos.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/employees" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</body>
</html>
