<!DOCTYPE html>
<html>
<head>
    <title>Добавить должность</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>➕ Добавить новую должность</h2>
        <form method="POST">
            <div class="mb-3"><label>Название</label><input type="text" name="title" class="form-control" required></div>
            <div class="mb-3"><label>Зарплата</label><input type="number" step="0.01" name="salary" class="form-control" required></div>
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/positions" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</body>
</html>
