<!DOCTYPE html>
<html>
<head>
    <title>Поиск</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>🔍 Поиск сотрудников</h2>
        <a href="/" class="btn btn-secondary mb-3">← На главную</a>
        <form method="POST">
            <div class="input-group">
                <input type="text" name="query" class="form-control" placeholder="Введите ФИО..." required>
                <button type="submit" class="btn btn-primary">Искать</button>
            </div>
        </form>
        {% if results %}
            <h4 class="mt-4">Результаты:</h4>
            <ul class="list-group">
                {% for res in results %}
                    <li class="list-group-item">{{ res.full_name }} — {{ res.dept_name }} ({{ res.pos_title }})</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
