<!DOCTYPE html>
<html>
<head>
    <title>Добавить отдел</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>➕ Добавить новый отдел</h2>
        <form method="POST">
            <div class="mb-3"><label>Название</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label>Расположение</label><input type="text" name="location" class="form-control" required></div>
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/departments" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</body>
</html>
